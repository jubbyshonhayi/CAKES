{% extends 'base.html' %}
{% block content %}
<h1>Students</h1>
<table>
  <thead>
    <tr><th>Name</th><th>Email</th><th>Enrollment #</th><th></th></tr>
  </thead>
  <tbody>
    {% for student in students %}
      <tr>
        <td><a href="{% url 'student-detail' student.pk %}">{{ student.first_name }} {{ student.last_name }}</a></td>
        <td>{{ student.email }}</td>
        <td>{{ student.enrollment_number }}</td>
        <td class="actions">
          <a class="button" href="{% url 'student-update' student.pk %}">Edit</a>
          <a class="button" href="{% url 'student-delete' student.pk %}">Delete</a>
        </td>
      </tr>
    {% empty %}
      <tr><td colspan="4">No students found.</td></tr>
    {% endfor %}
  </tbody>
</table>
{% endblock %}
